name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยแนวทางการจัดทำบัญชีข้อมูลภาครัฐ"
short_code: "DGS-3-1"
reference: "มรด. 3-1 : 2565 (Government Data Catalog Guideline)"
checklist:
  # ===== หมวด 1: กลไกธรรมาภิบาลข้อมูลและการเลือกชุดข้อมูล =====
  - id: "DGS31-01"
    category: "กลไกธรรมาภิบาลข้อมูล"
    requirement: "ต้องจัดตั้งคณะทำงานด้านข้อมูลของหน่วยงาน ประกอบด้วย คณะกรรมการธรรมาภิบาลข้อมูล (Data Governance Council) และทีมบริกรข้อมูล (Data Steward Team)"
    severity_if_missing: "high"

  - id: "DGS31-02"
    category: "กลไกธรรมาภิบาลข้อมูล"
    requirement: "ต้องกำหนดผู้มีส่วนได้เสียกับข้อมูล ได้แก่ เจ้าของข้อมูล (Data Owners), ทีมบริหารจัดการข้อมูล (Data Management Team), ผู้สร้างข้อมูล (Data Creators) และผู้ใช้ข้อมูล (Data Users) พร้อมระบุบทบาทและหน้าที่ชัดเจน"
    severity_if_missing: "high"

  - id: "DGS31-03"
    category: "กลไกธรรมาภิบาลข้อมูล"
    requirement: "ต้องกำหนดวิสัยทัศน์ พันธกิจ และเป้าหมายของคณะทำงานธรรมาภิบาลข้อมูล"
    severity_if_missing: "medium"

  - id: "DGS31-04"
    category: "กลไกธรรมาภิบาลข้อมูล"
    requirement: "ต้องวางแผนและจัดทำแผนที่การดำเนินงาน (Roadmap) ในการจัดทำธรรมาภิบาลข้อมูลและบัญชีข้อมูล"
    severity_if_missing: "medium"

  - id: "DGS31-05"
    category: "การเลือกชุดข้อมูลสำคัญ"
    requirement: "ต้องมีเกณฑ์ที่ชัดเจนในการคัดเลือกชุดข้อมูลสำคัญที่สอดคล้องกับภารกิจหน่วยงาน เช่น ข้อมูลตอบยุทธศาสตร์ (Strategic), ตัวชี้วัด (KPIs), ข้อมูลรายงานประจำ (Critical), ข้อมูลให้บริการประชาชน และข้อมูลแบ่งปัน (Shared)"
    severity_if_missing: "high"

  - id: "DGS31-06"
    category: "การเลือกชุดข้อมูลสำคัญ"
    requirement: "ต้องสำรวจแหล่งข้อมูลที่เป็นรูปแบบดิจิทัลภายในหน่วยงานทั้งหมด (ฐานข้อมูล, ไฟล์ข้อความ, CSV ฯลฯ) เพื่อรวบรวมและจัดทำรายการชุดข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 2: การจัดหมวดหมู่ข้อมูล (Data Classification) =====
  - id: "DGS31-07"
    category: "การจัดหมวดหมู่ข้อมูล"
    requirement: "ต้องจัดหมวดหมู่ข้อมูลตามกรอบธรรมาภิบาลข้อมูลภาครัฐออกเป็น 4 หมวด ได้แก่ ข้อมูลสาธารณะ, ข้อมูลส่วนบุคคล, ข้อมูลความลับทางราชการ และข้อมูลความมั่นคง"
    severity_if_missing: "high"

  - id: "DGS31-08"
    category: "การจัดหมวดหมู่ข้อมูล"
    requirement: "ต้องจัดทำเกณฑ์การจำแนกหมวดหมู่และชั้นความลับของข้อมูลในรูปแบบแผนผังการตัดสินใจ (Decision Tree) เพื่อให้ทุกส่วนงานใช้เป็นเครื่องมือร่วมกัน"
    severity_if_missing: "high"

  - id: "DGS31-09"
    category: "การจัดหมวดหมู่ข้อมูล"
    requirement: "การจำแนกหมวดหมู่ต้องสอดคล้องกับกฎหมายหลักที่เกี่ยวข้อง ได้แก่ พ.ร.บ. ข้อมูลข่าวสารของราชการ พ.ศ. 2540, พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562, ระเบียบว่าด้วยการรักษาความลับของทางราชการ พ.ศ. 2544 และบทบัญญัติเฉพาะของหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS31-10"
    category: "การจัดหมวดหมู่ข้อมูล"
    requirement: "กรณีชุดข้อมูลประกอบด้วยข้อมูลมากกว่า 1 ประเภท ต้องเลือกหมวดหมู่ที่ต้องให้ความคุ้มครองสูงสุดเป็นเกณฑ์"
    severity_if_missing: "high"

  - id: "DGS31-11"
    category: "การจัดหมวดหมู่ข้อมูล"
    requirement: "ต้องกำหนดสิทธิ์การเข้าถึง (Access Control) ใน 2 ระดับ คือ ระดับบัญชีรายชื่อชุดข้อมูล และระดับข้อมูล (ตัวข้อมูลภายใน)"
    severity_if_missing: "high"

  # ===== หมวด 3: เมทาดาตา (Metadata Standard) =====
  - id: "DGS31-12"
    category: "เมทาดาตา"
    requirement: "ต้องจัดทำคำอธิบายข้อมูลส่วนหลัก (Mandatory Metadata) ให้ครบทั้ง 14 รายการต่อ 1 ชุดข้อมูล ได้แก่ ประเภทข้อมูล, ชื่อชุดข้อมูล, องค์กร, ชื่อผู้ติดต่อ, อีเมลผู้ติดต่อ, คำสำคัญ, รายละเอียด, วัตถุประสงค์, ความถี่ของการปรับปรุง, ขอบเขตเชิงภูมิศาสตร์/พื้นที่, แหล่งที่มา, รูปแบบการเก็บข้อมูล, หมวดหมู่ข้อมูลตามธรรมาภิบาล และสัญญาอนุญาตให้ใช้ข้อมูล"
    severity_if_missing: "high"

  - id: "DGS31-13"
    category: "เมทาดาตา"
    requirement: "ต้องจัดทำคำอธิบายข้อมูลส่วนทางเลือก (Optional Metadata) เพิ่มเติมตามประเภทข้อมูล เช่น ข้อมูลสถิติ (การจัดจำแนก, วิธีคำนวณ), ข้อมูลภูมิศาสตร์ (มาตราส่วน, ความถูกต้องของตำแหน่ง)"
    severity_if_missing: "medium"

  - id: "DGS31-14"
    category: "เมทาดาตา"
    requirement: "ต้องจัดทำพจนานุกรมข้อมูล (Data Dictionary) อธิบายรายตัวแปร (Attribute) ของชุดข้อมูล อย่างน้อย 3 รายการ ได้แก่ ชื่อตัวแปร, ชนิดของตัวแปร และคำอธิบายตัวแปร"
    severity_if_missing: "high"

  - id: "DGS31-15"
    category: "เมทาดาตา"
    requirement: "ต้องจัดเก็บเมทาดาตาในรูปแบบดิจิทัล (เช่น CKAN, DCAT, CERIF) เพื่อให้สืบค้นและแลกเปลี่ยนข้อมูลแบบอัตโนมัติหรือกึ่งอัตโนมัติได้"
    severity_if_missing: "medium"

  - id: "DGS31-16"
    category: "เมทาดาตา"
    requirement: "ต้องจัดทำทั้งเมทาดาตาเชิงธุรกิจ (Business Metadata) และเมทาดาตาเชิงเทคนิค (Technical Metadata) พร้อมกระบวนการบริหารจัดการเมทาดาตา (Metadata Management)"
    severity_if_missing: "medium"

  - id: "DGS31-17"
    category: "เมทาดาตา"
    requirement: "ต้องปรับปรุงเมทาดาตาให้เป็นปัจจุบันอย่างสม่ำเสมอตามความเหมาะสมของข้อมูลภายในหน่วยงาน"
    severity_if_missing: "high"

  # ===== หมวด 4: ระบบบัญชีข้อมูลของหน่วยงาน (Agency Data Catalog) =====
  - id: "DGS31-18"
    category: "Agency Data Catalog"
    requirement: "ต้องพัฒนาหรือใช้ระบบบัญชีข้อมูลของหน่วยงาน (Agency Data Catalog) ที่มีฟังก์ชันบริหารจัดการชุดข้อมูล, จัดการคำอธิบายชุดข้อมูล, การค้นหา และการเชื่อมต่อ API"
    severity_if_missing: "high"

  - id: "DGS31-19"
    category: "Agency Data Catalog"
    requirement: "ระบบบัญชีข้อมูลของหน่วยงานต้องมีองค์ประกอบสำคัญตาม Data Catalog Reference Model ได้แก่ Data Inventory, Data Discovery, Data Governance, Data Quality และ Metadata Management"
    severity_if_missing: "medium"

  - id: "DGS31-20"
    category: "Agency Data Catalog"
    requirement: "กรณีหน่วยงานไม่มีระบบบัญชีข้อมูลของตนเอง ต้องประสานใช้ระบบร่วมกับหน่วยงานระดับกระทรวง (Ministry Data Catalog) หรือใช้บริการจากหน่วยงานกลาง"
    severity_if_missing: "medium"

  - id: "DGS31-21"
    category: "Agency Data Catalog"
    requirement: "ต้องจัดเตรียมการเชื่อมต่อ API เพื่อให้สามารถลงทะเบียนและเชื่อมโยงกับระบบบัญชีข้อมูลภาครัฐ (GD Catalog) ได้"
    severity_if_missing: "high"

  - id: "DGS31-22"
    category: "Agency Data Catalog"
    requirement: "ระบบต้องสามารถกำหนดสิทธิ์การเผยแพร่บัญชีข้อมูลใน 3 รูปแบบ ได้แก่ แบบสาธารณะ (Public), ภายในองค์กร (Private) และในระบบบัญชีข้อมูลภาครัฐ (Share for GD Catalog)"
    severity_if_missing: "high"

  # ===== หมวด 5: กรอบนโยบายข้อมูล (Data Policy) =====
  - id: "DGS31-23"
    category: "นโยบายข้อมูล"
    requirement: "ต้องจัดทำกรอบนโยบายข้อมูล (Data Policy) ของหน่วยงานเป็นลายลักษณ์อักษร ครอบคลุมการบริหารจัดการข้อมูลตลอดวงจรชีวิต"
    severity_if_missing: "high"

  - id: "DGS31-24"
    category: "นโยบายข้อมูล"
    requirement: "ต้องกำหนดนโยบายการเปิดเผยข้อมูล ครอบคลุม: ห้ามเปิดเผยข้อมูลที่ขัดต่อกฎหมาย/ระเบียบ, ต้องได้รับการอนุมัติจากเจ้าของข้อมูลก่อนเปิดเผย, ระบุช่องทางเปิดเผยที่เข้าถึงและนำไปใช้ได้ง่าย, เปิดเผยเมทาดาตาควบคู่กับข้อมูล และตรวจสอบความเหมาะสมของการเปิดเผย"
    severity_if_missing: "high"

  - id: "DGS31-25"
    category: "นโยบายข้อมูล"
    requirement: "ต้องจัดทำข้อมูลเปิดในรูปแบบที่เครื่องคอมพิวเตอร์อ่านได้ (Machine-Readable) ระดับการเปิดเผยข้อมูล 3 ดาวขึ้นไป (เช่น CSV, API) พร้อมเมทาดาตา"
    severity_if_missing: "medium"

  - id: "DGS31-26"
    category: "นโยบายข้อมูล"
    requirement: "ต้องกำหนดผู้รับผิดชอบหลักในการนำชุดข้อมูลขึ้นเผยแพร่สู่สาธารณะ ผ่านเว็บไซต์หน่วยงาน, ศูนย์กลางข้อมูลเปิดภาครัฐ (data.go.th) และ/หรือ URI ของหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS31-27"
    category: "นโยบายข้อมูล"
    requirement: "ต้องจัดให้มีช่องทางรับฟังความคิดเห็นและคำร้องขอข้อมูลจากผู้ใช้ข้อมูล เพื่อใช้ในการปรับปรุงคุณภาพข้อมูลของหน่วยงาน"
    severity_if_missing: "medium"

  - id: "DGS31-28"
    category: "นโยบายข้อมูล"
    requirement: "นโยบายต้องสอดคล้องกับมาตรฐานที่เกี่ยวข้อง ได้แก่ มรด. 4-1 (นโยบายการบริหารจัดการข้อมูล), มรด. 4-2 (แนวปฏิบัติการบริหารจัดการข้อมูล) และ มรด. 5 (การประเมินคุณภาพข้อมูล)"
    severity_if_missing: "medium"

  # ===== หมวด 6: คุณค่าของชุดข้อมูลและการคัดเลือก High Value Dataset =====
  - id: "DGS31-29"
    category: "ชุดข้อมูลคุณค่าสูง"
    requirement: "ต้องประเมินคุณค่าของชุดข้อมูล (High Value Dataset Assessment) ตามแบบฟอร์มที่ สพร. กำหนด เพื่อคัดเลือกชุดข้อมูลที่ควรเปิดเผยลำดับต้น"
    severity_if_missing: "medium"

  - id: "DGS31-30"
    category: "ชุดข้อมูลคุณค่าสูง"
    requirement: "การประเมินคุณค่าต้องพิจารณา: ความสอดคล้องกับยุทธศาสตร์ชาติ, ความสอดคล้องกับภารกิจ/ยุทธศาสตร์หน่วยงาน, ระดับวุฒิภาวะกระบวนการเปิดเผย, คุณภาพชุดข้อมูล, ความต้องการของผู้ใช้, ศักยภาพในการต่อยอด, รูปแบบ Machine-readable และความต่อเนื่องของข้อมูลย้อนหลัง"
    severity_if_missing: "medium"

  # ===== หมวด 7: การลงทะเบียนและการเชื่อมโยงกับ GD Catalog =====
  - id: "DGS31-31"
    category: "การลงทะเบียน GD Catalog"
    requirement: "ต้องลงทะเบียนบัญชีข้อมูลของหน่วยงานเข้าสู่ระบบบัญชีข้อมูลภาครัฐ (GD Catalog) ผ่านระบบลงทะเบียนของสำนักงานสถิติแห่งชาติ"
    severity_if_missing: "high"

  - id: "DGS31-32"
    category: "การลงทะเบียน GD Catalog"
    requirement: "ต้องแต่งตั้งและแจ้งผู้รับมอบหมายเข้าใช้งานระบบ (เจ้าหน้าที่ลงทะเบียนบัญชีข้อมูล และผู้จัดการระบบบัญชีข้อมูลหน่วยงาน) ต่อสำนักงานสถิติแห่งชาติ"
    severity_if_missing: "high"

  - id: "DGS31-33"
    category: "การลงทะเบียน GD Catalog"
    requirement: "ต้องรองรับการเชื่อมต่อ API ตามข้อกำหนดของสำนักงานสถิติแห่งชาติ ได้แก่ CKAN-API และ Directory API"
    severity_if_missing: "medium"

  - id: "DGS31-34"
    category: "การลงทะเบียน GD Catalog"
    requirement: "ระบบ GD Catalog ของหน่วยงานต้องเป็นไปตามมาตรฐานขั้นต่ำของ พ.ร.บ. การรักษาความมั่นคงปลอดภัยไซเบอร์ พ.ศ. 2562 และไม่น้อยกว่ามาตรฐานของหน่วยงานเจ้าของข้อมูล"
    severity_if_missing: "high"

  - id: "DGS31-35"
    category: "การลงทะเบียน GD Catalog"
    requirement: "เมื่อผู้ใช้งานระบบมีการเปลี่ยนแปลง (โยกย้าย, ลาออก, เปลี่ยนหน้าที่) ต้องแจ้งสำนักงานสถิติแห่งชาติเพื่อปรับปรุง/ยกเลิกสิทธิ์ และทบทวนสถานะผู้ใช้งานประจำปี"
    severity_if_missing: "medium"

  # ===== หมวด 8: การติดตามและบริหารจัดการคุณภาพ =====
  - id: "DGS31-36"
    category: "การติดตามและคุณภาพ"
    requirement: "ต้องบริหารจัดการบัญชีข้อมูลให้มีความถูกต้อง ครบถ้วน สมบูรณ์ ทันสมัย และพร้อมใช้งาน (Data Quality)"
    severity_if_missing: "high"

  - id: "DGS31-37"
    category: "การติดตามและคุณภาพ"
    requirement: "ต้องมีกระบวนการติดตามและจัดการข้อมูลตลอดวงจรชีวิต (Data Lifecycle) ทั้งการลงทะเบียน, การปรับปรุง, และการเพิกถอนการลงทะเบียน"
