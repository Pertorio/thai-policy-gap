name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยกรอบธรรมาภิบาลข้อมูลภาครัฐ ฉบับปรับปรุง: แนวปฏิบัติ"
short_code: "DGS-6"
reference: "มรด. 6 : 2566 (Data Governance Framework Revised: Guideline) เวอร์ชัน 2.0"
checklist:
  # ===== หมวด 1: กฎเกณฑ์ (Rules of Engagement) =====
  - id: "DGS6-01"
    category: "กฎเกณฑ์ - วิสัยทัศน์และพันธกิจ"
    requirement: "องค์ประกอบที่ 1: ต้องกำหนดวิสัยทัศน์และพันธกิจ (Vision and Mission) ของธรรมาภิบาลข้อมูลที่ชัดเจน ประกอบด้วย 3 ส่วน คือ การกำหนดกฎในเชิงรุก (Proactive Rules), การให้บริการข้อมูลแก่ผู้มีส่วนได้ส่วนเสียอย่างต่อเนื่อง (Ongoing Services) และการตอบสนอง/แก้ไขปัญหาได้ทันการณ์ (Reactive Issue Resolution)"
    severity_if_missing: "high"

  - id: "DGS6-02"
    category: "กฎเกณฑ์ - เป้าหมายและการวัดผล"
    requirement: "องค์ประกอบที่ 2: ต้องกำหนดเป้าหมาย การวัดธรรมาภิบาล/การวัดความสำเร็จ และยุทธศาสตร์การจัดหาเงินทุน (Goals, Governance Metrics/Success Measures, Funding Strategies)"
    severity_if_missing: "high"

  - id: "DGS6-03"
    category: "กฎเกณฑ์ - นิยามข้อมูลและกฎเกณฑ์"
    requirement: "องค์ประกอบที่ 3: ต้องกำหนดนิยามข้อมูลและกฎเกณฑ์ (Data Definitions and Rules) โดยสร้าง/รวบรวมกฎและคำนิยาม ระบุช่องว่างและความเกี่ยวข้อง จัดลำดับความสำคัญของกฎที่ขัดแย้งกัน และกำหนดกฎเกณฑ์การใช้คำนิยาม"
    severity_if_missing: "high"

  - id: "DGS6-04"
    category: "กฎเกณฑ์ - สิทธิในการตัดสินใจ"
    requirement: "องค์ประกอบที่ 4: ต้องกำหนดสิทธิในการตัดสินใจ (Decision Rights) ระบุว่าใครเป็นผู้ตัดสินใจ ต้องตัดสินใจเมื่อใด และมีกระบวนการอย่างไรในการตัดสินใจเกี่ยวกับข้อมูล/เมทาดาตา"
    severity_if_missing: "high"

  - id: "DGS6-05"
    category: "กฎเกณฑ์ - ความรับผิดชอบ"
    requirement: "องค์ประกอบที่ 5: ต้องกำหนดความสามารถในการตรวจสอบได้และการรับผิดชอบในผลของการดำเนินการ (Accountabilities) โดยมอบหมายหน้าที่ภายในหน่วยงานให้สอดคล้องกับกระบวนการในองค์กรและวงจรการพัฒนาระบบ (SDLC)"
    severity_if_missing: "high"

  - id: "DGS6-06"
    category: "กฎเกณฑ์ - การควบคุมความเสี่ยง"
    requirement: "องค์ประกอบที่ 6: ต้องกำหนดการควบคุมความเสี่ยง (Control) เกี่ยวกับข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 2: โครงสร้างธรรมาภิบาลและบุคลากร =====
  - id: "DGS6-07"
    category: "โครงสร้างและบุคลากร - ผู้มีส่วนได้ส่วนเสีย"
    requirement: "องค์ประกอบที่ 7: ต้องกำหนดผู้มีส่วนได้ส่วนเสีย (Data Stakeholders) โดยผู้มีส่วนได้ส่วนเสียระดับบริหารถูกกำหนดให้เป็นคณะกรรมการธรรมาภิบาลข้อมูล (Data Governance Council) เพื่อดูแลภาพรวม กำหนดนโยบายข้อมูล และแก้ไขปัญหา"
    severity_if_missing: "high"

  - id: "DGS6-08"
    category: "โครงสร้างและบุคลากร - สำนักธรรมาภิบาลข้อมูล"
    requirement: "องค์ประกอบที่ 8: ต้องจัดตั้งสำนัก/ฝ่ายธรรมาภิบาลข้อมูล (Data Governance Office) เพื่อช่วยเหลือและสนับสนุนกลุ่มบุคคลอื่น ๆ สนับสนุนการสื่อสาร การเข้าถึงแหล่งข้อมูล และให้ความรู้ที่เกี่ยวข้อง"
    severity_if_missing: "high"

  - id: "DGS6-09"
    category: "โครงสร้างและบุคลากร - บริกรข้อมูล"
    requirement: "องค์ประกอบที่ 9: ต้องกำหนดบริกรข้อมูล (Data Stewards) และควรจัดตั้งคณะกรรมการบริกรข้อมูล (Data Stewardship Council) ประกอบด้วยบริกรข้อมูลด้านธุรกิจ ด้านเทคนิค และนักวิเคราะห์ข้อมูล เพื่อร่างนโยบายข้อมูล ระบุมาตรฐาน และควบคุมคุณภาพข้อมูล (พิจารณาแบ่งคณะทำงานย่อยตามขนาดหน่วยงาน)"
    severity_if_missing: "high"

  # ===== หมวด 3: กระบวนการธรรมาภิบาลข้อมูลภาครัฐ =====
  - id: "DGS6-10"
    category: "กระบวนการธรรมาภิบาลข้อมูล"
    requirement: "องค์ประกอบที่ 10: ต้องกำหนดกระบวนการธรรมาภิบาลข้อมูลภาครัฐ ประกอบด้วย กำหนดเป้าหมาย/ยุทธศาสตร์ เตรียมแผนงาน วางแผนงานและงบประมาณ ออกแบบแผนดำเนินการ ประกาศใช้แผนดำเนินการ และติดตาม/วัดผล/รายงานผลการดำเนินงาน"
    severity_if_missing: "high"

  - id: "DGS6-11"
    category: "กระบวนการธรรมาภิบาลข้อมูล"
    requirement: "วิธีการและกระบวนการควบคุมข้อมูล (Data Governance Processes) ต้องได้รับการรับรองเป็นลายลักษณ์อักษรจากผู้บริหาร สามารถปฏิบัติซ้ำได้เป็นขั้นตอน และอยู่ภายใต้พื้นฐานที่สอดคล้องกับกฎเกณฑ์การบริหารจัดการข้อมูล"
    severity_if_missing: "high"

  - id: "DGS6-12"
    category: "กระบวนการธรรมาภิบาลข้อมูล"
    requirement: "ต้องระบุความสัมพันธ์ของ 4 กระบวนการหลัก ได้แก่ การวางแผน, การปฏิบัติ, การตรวจสอบ/วัดผล/รายงาน และการปรับปรุงธรรมาภิบาล พร้อมส่วนนำเข้า (Input) ส่วนนำออก (Output) และผู้มีส่วนได้เสียกับข้อมูล"
    severity_if_missing: "medium"

  # ===== หมวด 4: นโยบายข้อมูลและสภาพแวดล้อมธรรมาภิบาล =====
  - id: "DGS6-13"
    category: "นโยบายข้อมูล"
    requirement: "ต้องกำหนดนโยบายข้อมูล (Data Policies) ที่ระบุชัดเจน สอดคล้องกับกฎหมาย/ระเบียบ/ข้อบังคับ ผ่านการอนุมัติจากผู้บริหาร เผยแพร่และสื่อสารทั้งภายในและภายนอกหน่วยงาน และทบทวนอย่างสม่ำเสมอ (อ้างอิง มรด. 4-1, มรด. 4-2)"
    severity_if_missing: "high"

  - id: "DGS6-14"
    category: "นโยบายข้อมูล"
    requirement: "ต้องระบุขั้นตอนการตรวจสอบความสอดคล้องระหว่างนโยบายข้อมูลกับการดำเนินงานของผู้เกี่ยวข้อง และความสอดคล้องระหว่างนโยบายข้อมูลกับกฎหมาย โดยบริกรข้อมูลเป็นผู้ตรวจสอบและรายงานต่อคณะกรรมการธรรมาภิบาลข้อมูล"
    severity_if_missing: "medium"

  - id: "DGS6-15"
    category: "นิยามและกฎเกณฑ์ข้อมูล"
    requirement: "ต้องนิยามข้อมูลให้ครบ ทั้งประเภทข้อมูล (มีโครงสร้าง/กึ่งโครงสร้าง/ไม่มีโครงสร้าง), ชุดข้อมูล, ฐานข้อมูล และหมวดหมู่ของข้อมูล 5 หมวด (สาธารณะ, ใช้ภายใน, ส่วนบุคคล, ความลับทางราชการ, ความมั่นคง)"
    severity_if_missing: "high"

  - id: "DGS6-16"
    category: "นิยามและกฎเกณฑ์ข้อมูล"
    requirement: "ต้องกำหนดระดับชั้นข้อมูล (Data Classification Level) ได้แก่ ชั้นเปิดเผย (Open), ชั้นเผยแพร่ภายในองค์กร (Private), ชั้นลับ (Confidential), ชั้นลับมาก (Secret) และชั้นลับที่สุด (Top Secret)"
    severity_if_missing: "high"

  - id: "DGS6-17"
    category: "นิยามและกฎเกณฑ์ข้อมูล"
    requirement: "ต้องกำหนดยุทธศาสตร์ด้านข้อมูล (Data Strategy) ที่สอดคล้องกับยุทธศาสตร์และบทบาทขององค์กร มีสถาปัตยกรรมข้อมูล (Data Architecture) วิสัยทัศน์การจัดการข้อมูล ตัวชี้วัดและการวัดความสำเร็จที่ชัดเจน"
    severity_if_missing: "medium"

  # ===== หมวด 5: การวัดการดำเนินการและความสำเร็จ =====
  - id: "DGS6-18"
    category: "การวัดผลและความสำเร็จ"
    requirement: "ต้องประเมินความพร้อมของธรรมาภิบาลข้อมูลภาครัฐ (Data Governance Readiness Assessment) ตามระดับ 0-5 (None, Initial, Managed, Standardized, Advanced, Optimized) ครอบคลุมโครงสร้าง กระบวนการ นโยบาย/การตรวจสอบ การประเมินคุณภาพ/ความมั่นคงปลอดภัย และการปรับปรุงต่อเนื่อง"
    severity_if_missing: "high"

  - id: "DGS6-19"
    category: "การวัดผลและความสำเร็จ"
    requirement: "ต้องประเมินคุณภาพของข้อมูล (Data Quality Assessment) ตามมิติคุณภาพข้อมูล 5 มิติ ได้แก่ ความถูกต้องและสมบูรณ์, ความสอดคล้องกัน, ความเป็นปัจจุบัน, ตรงตามความต้องการของผู้ใช้ และความพร้อมใช้ (อ้างอิง มรด. 5)"
    severity_if_missing: "high"

  - id: "DGS6-20"
    category: "การวัดผลและความสำเร็จ"
    requirement: "ต้องประเมินความมั่นคงปลอดภัยของข้อมูล โดยพิจารณาด้านการรักษาความลับ, ความถูกต้องครบถ้วนสมบูรณ์/ความคงสภาพ (Integrity) และความพร้อมใช้งาน (Availability) ตามมาตรฐาน ISO/IEC 27001"
    severity_if_missing: "high"

  - id: "DGS6-21"
    category: "การวัดผลและความสำเร็จ"
    requirement: "ความสำเร็จของธรรมาภิบาลข้อมูลภาครัฐต้องวัดจาก คุณภาพของข้อมูล, ความมั่นคงปลอดภัยของข้อมูล และมูลค่าเชิงธุรกิจ และต้องค้นหาสาเหตุพร้อมแก้ไขเกณฑ์การประเมินหากระดับความพร้อมไม่สอดคล้องกับความสำเร็จ"
    severity_if_missing: "medium"

  # ===== หมวด 6: การออกแบบและการขับเคลื่อนสู่การปฏิบัติ =====
  - id: "DGS6-22"
    category: "การขับเคลื่อนสู่การปฏิบัติ"
    requirement: "ต้องออกแบบและดำเนินการจัดทำธรรมาภิบาลข้อมูลภาครัฐโดยประยุกต์กรอบ DGI (Thomas, 2009) ครบทั้ง 3 หมวด 10 องค์ประกอบ ให้เหมาะสมกับบริบทและขนาดของหน่วยงาน โดยมีการสนับสนุนทั่วทั้งหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS6-23"
    category: "การขับเคลื่อนสู่การปฏิบัติ"
    requirement: "ต้องเชื่อมโยงการดำเนินงานกับแนวปฏิบัติของมาตรฐานที่เกี่ยวข้อง ได้แก่ มรด. 3-1, มรด. 3-2 (GD Catalog), มรด. 4-1, มรด. 4-2 (Data Policy & Guideline), มรด. 5 (Data Quality) และ มสพร. 8 (Data Classification & Sharing)"
    severity_if_missing: "medium"

  - id: "DGS6-24"
    category: "การขับเคลื่อนสู่การปฏิบัติ"
    requirement: "ธรรมาภิบาลข้อมูลภาครัฐต้องครอบคลุมหน่วยงานภาครัฐทั้ง 4 ประเภท (ส่วนราชการ, รัฐวิสาหกิจ, องค์การมหาชน, หน่วยงานของรัฐรูปแบบใหม่) ตามนิยามใน พ.ร.บ. การบริหารงานและการให้บริการภาครัฐผ่านระบบดิจิทัล พ.ศ. 2562"
    severity_if_missing: "medium"