name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยหลักเกณฑ์การประเมินคุณภาพข้อมูลสำหรับหน่วยงานภาครัฐ"
short_code: "DGS-5"
reference: "มรด. 5 : 2565 (Data Quality Assessment Framework for Government Agency)"
checklist:
  # ===== หมวด 1: กรอบและขอบเขตการประเมินคุณภาพข้อมูล =====
  - id: "DGS5-01"
    category: "กรอบการประเมิน"
    requirement: "ต้องนำกรอบการประเมินคุณภาพข้อมูลสำหรับหน่วยงานภาครัฐ (DQA Framework: DQAF) มาใช้เป็นแนวทางในการตรวจสอบและประเมินคุณภาพข้อมูลเบื้องต้นตามกรอบธรรมาภิบาลข้อมูลภาครัฐ"
    severity_if_missing: "high"

  - id: "DGS5-02"
    category: "กรอบการประเมิน"
    requirement: "ต้องกำหนดขอบเขตการประเมิน โดยเริ่มใช้กับข้อมูลประเภทข้อมูลระเบียน (Record) และ/หรือ Tabular Format Data ที่อยู่ใน Database ซึ่งเป็นข้อมูลสำคัญและหน่วยงานใช้งานเป็นประจำ"
    severity_if_missing: "medium"

  - id: "DGS5-03"
    category: "กรอบการประเมิน"
    requirement: "ต้องเลือกใช้วิธีการและเครื่องมือประเมินคุณภาพที่เหมาะสม เช่น การจัดทำตัวชี้วัดคุณภาพ (Quality Indicators), การประเมินตนเอง (Self-Assessment), การตรวจประเมิน (Auditing), การรับรองมาตรฐานสากล (Certification) และเครื่องมือคุณภาพ เช่น PDCA, process flow chart, control chart"
    severity_if_missing: "medium"

  # ===== หมวด 2: มิติคุณภาพข้อมูล 5 มิติ =====
  - id: "DGS5-04"
    category: "มิติคุณภาพ - ความถูกต้องและสมบูรณ์"
    requirement: "ต้องประเมินมิติความถูกต้องและสมบูรณ์ (Accuracy and Completeness) ตามตัวชี้วัด: มีแหล่งข้อมูลที่น่าเชื่อถือ, มีกระบวนการ/เครื่องมือตรวจสอบจุดผิดพลาด, มีการตรวจสอบความครบถ้วน, มีวิธีเก็บข้อมูลที่เป็นกลางและไม่มีอคติ และมีการระบุคำนิยามและลักษณะข้อมูลที่ต้องการ"
    severity_if_missing: "high"

  - id: "DGS5-05"
    category: "มิติคุณภาพ - ความสอดคล้องกัน"
    requirement: "ต้องประเมินมิติความสอดคล้องกัน (Consistency) ตามตัวชี้วัด: เก็บข้อมูลภายใต้มาตรฐานเดียวกัน/สอดคล้องกัน, ตรวจสอบรูปแบบข้อมูลภายในชุดข้อมูลเดียวกัน, ข้อมูลเชื่อมโยงและไม่ขัดแย้งกัน, ใช้กฎ/วิธีตรวจวัดที่สอดคล้องกันทั้งหน่วยงานและภายนอก และกำหนดบทบาท/ผู้รับผิดชอบข้อมูล"
    severity_if_missing: "high"

  - id: "DGS5-06"
    category: "มิติคุณภาพ - ตรงตามความต้องการของผู้ใช้"
    requirement: "ต้องประเมินมิติตรงตามความต้องการของผู้ใช้ (Relevancy) ตามตัวชี้วัด: ข้อมูลตรงตามความต้องการและวัตถุประสงค์การใช้งาน และมีผลประเมินความพึงพอใจของผู้ใช้พร้อมการปรับปรุงคุณภาพให้ตรงความต้องการ"
    severity_if_missing: "high"

  - id: "DGS5-07"
    category: "มิติคุณภาพ - ความเป็นปัจจุบัน"
    requirement: "ต้องประเมินมิติความเป็นปัจจุบัน (Timeliness) ตามตัวชี้วัด: ข้อมูลเผยแพร่/ส่งต่อตรงเวลา, ข้อมูลเป็นปัจจุบัน, เผยแพร่ในเวลาที่เหมาะสม และมีการจัดทำปฏิทินเผยแพร่ข้อมูล"
    severity_if_missing: "high"

  - id: "DGS5-08"
    category: "มิติคุณภาพ - ความพร้อมใช้"
    requirement: "ต้องประเมินมิติความพร้อมใช้ (Availability) ตามตัวชี้วัด: ข้อมูลอยู่ในรูปแบบพร้อมใช้งานและเหมาะกับผู้ใช้, เผยแพร่และเข้าถึงได้สะดวกตามสิทธิ, อ่านด้วยโปรแกรมคอมพิวเตอร์ได้, มีคำอธิบายข้อมูลชัดเจน และมีคำอธิบายขั้นตอนการขอข้อมูลที่ไม่เผยแพร่"
    severity_if_missing: "high"

  # ===== หมวด 3: เครื่องมือการประเมินคุณภาพข้อมูล =====
  - id: "DGS5-09"
    category: "เครื่องมือการประเมิน"
    requirement: "ต้องใช้แบบตรวจประเมินคุณภาพข้อมูล (DQA Checklist) เพื่อตรวจสอบกระบวนการเตรียมข้อมูลที่มีคุณภาพในทั้ง 5 มิติ สำหรับผู้ประเมินคุณภาพข้อมูล"
    severity_if_missing: "high"

  - id: "DGS5-10"
    category: "เครื่องมือการประเมิน"
    requirement: "ต้องใช้แบบประเมินคุณภาพข้อมูลด้วยตนเอง (DQA Self-Assessment) เพื่อวัดผลลัพธ์ข้อมูล (Data Output) ตามมิติคุณภาพข้อมูล สำหรับเจ้าของข้อมูล (Data Owner) โดยกรอกค่าคะแนนในแต่ละมิติของตัวชี้วัด และแสดงผลเป็น Radar Graph"
    severity_if_missing: "high"

  - id: "DGS5-11"
    category: "เครื่องมือการประเมิน"
    requirement: "ต้องใช้แบบตรวจประเมินการควบคุมและติดตามคุณภาพข้อมูล (DQC Checklist) ตามกระบวนการจัดทำธรรมาภิบาลข้อมูลภาครัฐ สำหรับผู้ประเมินคุณภาพข้อมูล/เจ้าของข้อมูล โดยกรอกด้วยระบบอิเล็กทรอนิกส์"
    severity_if_missing: "high"

  # ===== หมวด 4: บทบาทผู้รับผิดชอบและกระบวนการประเมิน =====
  - id: "DGS5-12"
    category: "บทบาทและกระบวนการ"
    requirement: "ผู้ประเมินคุณภาพข้อมูลต้องทำความเข้าใจข้อเสนอแนะสำหรับดำเนินการประเมินคุณภาพข้อมูล กรอกรายละเอียดในรายงานคุณภาพ และตรวจประเมินตามรายการในแต่ละมิติของตัวชี้วัดใน DQA Checklist"
    severity_if_missing: "medium"

  - id: "DGS5-13"
    category: "บทบาทและกระบวนการ"
    requirement: "เจ้าของข้อมูล (Data Owner) ต้องพิจารณาข้อมูลภาพรวมของหน่วยงาน ทำความเข้าใจเกณฑ์และคำอธิบาย ทำการประเมินคุณภาพข้อมูลด้วยตนเอง และนำส่งผลการประเมินให้ผู้ประเมินคุณภาพข้อมูล"
    severity_if_missing: "medium"

  - id: "DGS5-14"
    category: "บทบาทและกระบวนการ"
    requirement: "ต้องจัดทำรายงานสรุปผลการตรวจประเมินเสนอผู้บริหารรับทราบ และดำเนินการตามแผนปฏิบัติการจัดการคุณภาพข้อมูลของหน่วยงานต่อไป"
    severity_if_missing: "high"

  - id: "DGS5-15"
    category: "บทบาทและกระบวนการ"
    requirement: "ผลการประเมินคุณภาพข้อมูลต้องนำไปใช้ในการวางแผนและปรับปรุงคุณภาพข้อมูลอย่างต่อเนื่อง เพื่อประกันความน่าเชื่อถือและประสิทธิภาพในการใช้ข้อมูล"
    severity_if_missing: "medium"

  # ===== หมวด 5: ความสอดคล้องกับมาตรฐานที่เกี่ยวข้อง =====
  - id: "DGS5-16"
    category: "มาตรฐานอ้างอิง"
    requirement: "หลักเกณฑ์การประเมินคุณภาพข้อมูลต้องสอดคล้องกับองค์ประกอบในการประเมินคุณภาพข้อมูลตามกรอบธรรมาภิบาลข้อมูลภาครัฐ (มรด. 6) และเชื่อมโยงกับนโยบาย/แนวปฏิบัติการบริหารจัดการข้อมูล (มรด. 4-1, มรด. 4-2)"
    severity_if_missing: "medium"