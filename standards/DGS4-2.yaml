name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยข้อเสนอแนะสำหรับการจัดทำแนวปฏิบัติการบริหารจัดการข้อมูล"
short_code: "DGS-4-2"
reference: "มรด. 4-2 : 2565 (Recommendation for Writing Data Management Guideline)"
checklist:
  # ===== หมวด 1: ส่วนหัวเอกสารและบทนำ =====
  - id: "DGS42-01"
    category: "ส่วนหัวเอกสาร"
    requirement: "แนวปฏิบัติต้องระบุชื่อ Template (แนวปฏิบัติการบริหารจัดการข้อมูล / Data Management Guideline), ชื่อผู้อนุมัติ (หัวหน้าหน่วยงานของรัฐ หรือผู้ได้รับมอบอำนาจ), ชื่อผู้ตรวจสอบ (คณะกรรมการธรรมาภิบาลข้อมูล หรือ Chief Data Officer) และชื่อผู้จัดทำ (กอง/สำนัก/ฝ่าย/ศูนย์ หรือคณะทำงานธรรมาภิบาลข้อมูล)"
    severity_if_missing: "high"

  - id: "DGS42-02"
    category: "ส่วนหัวเอกสาร"
    requirement: "ต้องมีบทนำ ระบุหลักการและขอบเขตของแนวปฏิบัติว่าจัดทำโดยใคร มีผลบังคับใช้กับใคร ความรับผิดหากไม่ปฏิบัติตาม และต้องครอบคลุมระบบบริหารและกระบวนการจัดการข้อมูล/วงจรชีวิตข้อมูล หมวดหมู่และการจัดระดับชั้นข้อมูล ผู้เกี่ยวข้อง คำนิยามสำคัญ การเผยแพร่และการทบทวน"
    severity_if_missing: "high"

  - id: "DGS42-03"
    category: "ส่วนหัวเอกสาร"
    requirement: "แนวปฏิบัติต้องสอดคล้องกับนโยบายการบริหารจัดการข้อมูล (มรด. 4-1) ที่หน่วยงานจัดทำและประกาศใช้ และเหมาะสมกับบริบทการทำงาน ระบบจัดเก็บข้อมูล (Legacy System) และเครื่องมือของหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS42-04"
    category: "ส่วนหัวเอกสาร"
    requirement: "ต้องเผยแพร่แนวปฏิบัติโดยประกาศเวียนในอินทราเน็ต เว็บไซต์ และอีเมล และทบทวนเป็นประจำอย่างน้อยปีละ 1 ครั้ง (ระยะแรกอาจทบทวนรายไตรมาส) หรือเมื่อมีการเปลี่ยนแปลงที่สำคัญ"
    severity_if_missing: "medium"

  # ===== หมวด 2: หมวดหมู่และการจัดระดับชั้นของข้อมูล =====
  - id: "DGS42-05"
    category: "หมวดหมู่และระดับชั้นข้อมูล"
    requirement: "ต้องแบ่งหมวดหมู่ข้อมูลตามกรอบธรรมาภิบาลข้อมูลและการใช้งานภายใน ได้แก่ ข้อมูลสาธารณะ, ข้อมูลส่วนบุคคล, ข้อมูลความมั่นคง, ข้อมูลความลับทางราชการ และข้อมูลใช้ภายในหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS42-06"
    category: "หมวดหมู่และระดับชั้นข้อมูล"
    requirement: "ต้องกำหนดการจัดระดับชั้นความลับของข้อมูลให้ครบ ได้แก่ ข้อมูลใช้ภายใน (Internal Use Only), ข้อมูลที่มีชั้นความลับ (ลับ/Confidential, ลับมาก/Secret, ลับที่สุด/Top Secret) และข้อมูลเปิดเผยได้ (Public) พร้อมระบุผู้มีอำนาจอนุมัติการเปิดเผยและการลงนามในข้อตกลงไม่เปิดเผยข้อมูล (NDA) ในแต่ละชั้น"
    severity_if_missing: "high"

  # ===== หมวด 3: แนวปฏิบัติตามวงจรชีวิตข้อมูล - 6 หมวด =====
  - id: "DGS42-07"
    category: "โครงสร้างแนวปฏิบัติ"
    requirement: "ต้องระบุแนวปฏิบัติการบริหารจัดการข้อมูลตามวงจรชีวิตข้อมูล แบ่งออกเป็น 6 หมวด ได้แก่ (1) การสร้างข้อมูล (2) การจัดเก็บข้อมูล (รวมการจัดเก็บถาวร) (3) การประมวลผลและการใช้ข้อมูล (4) การเปิดเผยข้อมูล (5) การทำลายข้อมูล และ (6) การเชื่อมโยงและการแลกเปลี่ยนข้อมูล"
    severity_if_missing: "high"

  - id: "DGS42-08"
    category: "โครงสร้างแนวปฏิบัติ"
    requirement: "ในแต่ละหมวดต้องระบุครบ 4 องค์ประกอบ ได้แก่ วัตถุประสงค์, ผู้รับผิดชอบงาน, อ้างอิง (กฎหมาย/มาตรฐาน) และข้อปฏิบัติ พร้อมตารางแสดงความสัมพันธ์ระหว่างกระบวนการ/กิจกรรมและผู้มีส่วนได้ส่วนเสีย (RASCI)"
    severity_if_missing: "high"

  # ===== หมวด 4: หมวด 1 การสร้างข้อมูล =====
  - id: "DGS42-09"
    category: "การสร้างข้อมูล"
    requirement: "ต้องกำหนดข้อปฏิบัติการสร้างข้อมูล: กำหนดผู้มีสิทธิสร้างข้อมูลและกำหนดหมวดหมู่/ชั้นความลับ, สร้างข้อมูลที่ไม่ขัดต่อกฎหมายและจากแหล่งที่เชื่อถือได้, จัดทำคำอธิบายชุดข้อมูลดิจิทัล, ประเมินคุณค่าของชุดข้อมูล และตรวจสอบความถูกต้องของข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 5: หมวด 2 การจัดเก็บข้อมูล =====
  - id: "DGS42-10"
    category: "การจัดเก็บข้อมูล"
    requirement: "ต้องกำหนดให้เจ้าของข้อมูลกำหนดระยะเวลาจัดเก็บข้อมูลที่ชัดเจน และให้ทีมบริหารจัดการข้อมูล/ผู้ดูแลระบบย้ายข้อมูลที่เกินระยะเวลาไปจัดเก็บถาวร"
    severity_if_missing: "high"

  - id: "DGS42-11"
    category: "การจัดเก็บข้อมูล"
    requirement: "ต้องกำหนดให้การจัดเก็บชุดข้อมูลมีคำอธิบายชุดข้อมูลดิจิทัล (เมทาดาตา) ครบถ้วน และจัดเก็บข้อมูลตามการจัดชั้นความลับ โดยทำการเข้ารหัสข้อมูล (เข้ารหัสเฉพาะฟิลด์ที่มีชั้นความลับ กรณีตารางเดียวกัน)"
    severity_if_missing: "high"

  - id: "DGS42-12"
    category: "การจัดเก็บข้อมูล"
    requirement: "ต้องกำหนดวิธีปฏิบัติการกู้คืนข้อมูลที่จัดเก็บถาวรสำหรับข้อมูลสำคัญ และกรณีข้อมูลส่วนบุคคลให้เก็บรวบรวมเท่าที่จำเป็นภายใต้กฎหมายว่าด้วยการคุ้มครองข้อมูลส่วนบุคคล"
    severity_if_missing: "high"

  # ===== หมวด 6: หมวด 3 การประมวลผลและการใช้ข้อมูล =====
  - id: "DGS42-13"
    category: "การประมวลผลและการใช้ข้อมูล"
    requirement: "ต้องกำหนดข้อปฏิบัติการประมวลผลและการใช้ข้อมูล รวมถึงการถ่ายโอนข้อมูล การเปลี่ยนรูปแบบการจัดเก็บ การวิเคราะห์ การจัดทำรายงาน และการสำรอง (Backup) / กู้คืน (Restore) ข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 7: หมวด 4 การเปิดเผยข้อมูล =====
  - id: "DGS42-14"
    category: "การเปิดเผยข้อมูล"
    requirement: "ต้องกำหนดให้เจ้าของข้อมูลเปิดเผยข้อมูลในความรับผิดชอบต่อสาธารณะ ตามกฎหมายว่าด้วยข้อมูลข่าวสารของราชการ และมาตรฐาน/หลักเกณฑ์การเปิดเผยข้อมูลเปิดภาครัฐในรูปแบบดิจิทัล"
    severity_if_missing: "high"

  - id: "DGS42-15"
    category: "การเปิดเผยข้อมูล"
    requirement: "ต้องอ้างอิงกฎหมายในหมวดการเปิดเผยข้อมูลให้ครบ ได้แก่ พ.ร.บ. ข้อมูลข่าวสารราชการ พ.ศ. 2540, พ.ร.บ. การอำนวยความสะดวกฯ พ.ศ. 2558, พ.ร.บ. การบริหารงานและการให้บริการภาครัฐผ่านระบบดิจิทัล พ.ศ. 2562, พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562"
    severity_if_missing: "medium"

  # ===== หมวด 8: หมวด 5 การทำลายข้อมูล =====
  - id: "DGS42-16"
    category: "การทำลายข้อมูล"
    requirement: "ต้องกำหนดข้อปฏิบัติการทำลายข้อมูลที่จัดเก็บถาวรเป็นระยะเวลานานหรือเกินกว่าระยะเวลาที่กำหนด ให้เป็นไปตามแนวปฏิบัติและกฎหมายที่เกี่ยวข้อง"
    severity_if_missing: "medium"

  # ===== หมวด 9: หมวด 6 การเชื่อมโยงและการแลกเปลี่ยนข้อมูล =====
  - id: "DGS42-17"
    category: "การเชื่อมโยงและแลกเปลี่ยนข้อมูล"
    requirement: "ต้องกำหนดวิธีปฏิบัติและมาตรฐานทางเทคนิคที่จำเป็นในการเชื่อมโยงและแลกเปลี่ยนข้อมูล และตรวจสอบคำอธิบายชุดข้อมูลดิจิทัลและชั้นความลับของข้อมูลให้ครบถ้วนก่อนเชื่อมโยง"
    severity_if_missing: "high"

  - id: "DGS42-18"
    category: "การเชื่อมโยงและแลกเปลี่ยนข้อมูล"
    requirement: "กรณีหน่วยงานอื่นที่ไม่มีอำนาจเข้าถึงข้อมูลส่วนบุคคลขอใช้เพื่อการศึกษา/วิจัย (ข้อยกเว้นตาม พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล) ต้องแสดงข้อมูลด้วยวิธีไม่แสดงตัวตน (Anonymization)"
    severity_if_missing: "high"

  - id: "DGS42-19"
    category: "การเชื่อมโยงและแลกเปลี่ยนข้อมูล"
    requirement: "ต้องกำหนดมาตรการรักษาความมั่นคงปลอดภัยในการเชื่อมโยงและแลกเปลี่ยน ห้ามส่งต่อข้อมูลที่เป็นการกระทำความผิดตามกฎหมายคอมพิวเตอร์ และกำหนดให้ผู้ดูแลระบบแม่ข่ายจัดเก็บบันทึกหลักฐานการเชื่อมโยง/แลกเปลี่ยนข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 10: ภาคผนวกและเอกสารแบบฟอร์ม =====
  - id: "DGS42-20"
    category: "ภาคผนวก"
    requirement: "ต้องระบุภาคผนวก เอกสารและแบบฟอร์มที่ใช้ในการบริหารจัดการข้อมูล อาทิ แบบฟอร์มรายชื่อชุดข้อมูลที่สัมพันธ์กับกระบวนการทำงานตามภารกิจ, แบบฟอร์มคำอธิบายข้อมูล (Metadata), แบบฟอร์มคำอธิบายข้อมูลของทรัพยากร (Resource Metadata) และแบบฟอร์มชุดข้อมูลคุณค่าสูง (High Value Datasets Checklist)"
    severity_if_missing: "medium"

  - id: "DGS42-21"
    category: "ภาคผนวก"
    requirement: "ควรจัดทำหลักสูตรอบรมด้านการจัดทำธรรมาภิบาลข้อมูล กำหนดกลุ่มผู้เรียนตามบทบาท พร้อมเกณฑ์องค์ความรู้ขั้นต่ำ และปรับปรุงหลักสูตรอย่างสม่ำเสมอ"
    severity_if_missing: "low"