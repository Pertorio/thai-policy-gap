name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยข้อเสนอแนะสำหรับการจัดทำนโยบายการบริหารจัดการข้อมูล"
short_code: "DGS-4-1"
reference: "มรด. 4-1 : 2565 (Recommendation for Writing Data Management Policy)"
checklist:
  # ===== หมวด 1: ส่วนหัวเอกสารและการอนุมัติ =====
  - id: "DGS41-01"
    category: "ส่วนหัวเอกสาร"
    requirement: "นโยบายต้องระบุชื่อ Template (นโยบายการบริหารจัดการข้อมูล / Data Management Policy), ชื่อหน่วยงาน, ชื่อผู้อนุมัติ (หัวหน้าหน่วยงานของรัฐ หรือผู้ได้รับมอบอำนาจ) และชื่อผู้จัดทำ (กอง/สำนัก/ฝ่าย/ศูนย์ หรือคณะกรรมการ/คณะทำงานธรรมาภิบาลข้อมูล)"
    severity_if_missing: "high"

  - id: "DGS41-02"
    category: "ส่วนหัวเอกสาร"
    requirement: "ต้องมีตารางควบคุมเวอร์ชัน ระบุเวอร์ชัน ผู้อนุมัติ วันที่อนุมัติ วันที่มีผลบังคับใช้ และกำหนดการปรับปรุงครั้งถัดไป"
    severity_if_missing: "medium"

  - id: "DGS41-03"
    category: "ส่วนหัวเอกสาร"
    requirement: "นโยบายต้องผ่านความเห็นชอบจากคณะกรรมการธรรมาภิบาลข้อมูลของหน่วยงาน และเผยแพร่เป็นลายลักษณ์อักษร แจ้งเวียนผ่านระบบสารบรรณอิเล็กทรอนิกส์ อินทราเน็ต และเว็บไซต์หน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS41-04"
    category: "ส่วนหัวเอกสาร"
    requirement: "ต้องกำหนดให้มีการทบทวนนโยบายอย่างน้อยปีละ 1 ครั้ง หรือเมื่อมีการเปลี่ยนแปลงที่สำคัญ หรือเมื่อคณะกรรมการธรรมาภิบาลข้อมูลเห็นสมควร"
    severity_if_missing: "high"

  # ===== หมวด 2: วัตถุประสงค์ ขอบเขต และข้อยกเว้น =====
  - id: "DGS41-05"
    category: "วัตถุประสงค์และขอบเขต"
    requirement: "ต้องระบุวัตถุประสงค์ของนโยบายอย่างกระชับ ครอบคลุมการบริหารจัดการข้อมูลอย่างเป็นระบบ การขับเคลื่อนองค์กรด้วยข้อมูล (Data Driven Organization) และความสอดคล้องกับกฎหมาย กรอบธรรมาภิบาลข้อมูลภาครัฐ และระเบียบปฏิบัติที่เกี่ยวข้อง"
    severity_if_missing: "high"

  - id: "DGS41-06"
    category: "วัตถุประสงค์และขอบเขต"
    requirement: "ต้องระบุขอบเขตและการบังคับใช้ ครอบคลุมระดับย่อยของหน่วยงาน ระบบสารสนเทศ และกลุ่มบุคลากร (ข้าราชการ เจ้าหน้าที่ ผู้รับจ้าง ผู้จัดหาระบบ) ที่ต้องปฏิบัติตามนโยบาย รวมถึงความรับผิดหากไม่ดำเนินการตามนโยบาย"
    severity_if_missing: "high"

  - id: "DGS41-07"
    category: "วัตถุประสงค์และขอบเขต"
    requirement: "ต้องระบุข้อยกเว้นของนโยบาย (ถ้ามี) ให้ชัดเจน"
    severity_if_missing: "low"

  # ===== หมวด 3: บทบาทความรับผิดชอบและคำนิยาม =====
  - id: "DGS41-08"
    category: "บทบาทและคำนิยาม"
    requirement: "ต้องกำหนดบทบาทและความรับผิดชอบของผู้มีส่วนเกี่ยวข้องกับการจัดทำนโยบาย เช่น คณะกรรมการธรรมาภิบาลข้อมูล, บริกรข้อมูลด้านธุรกิจ, บริกรข้อมูลด้านเทคนิค, เจ้าของข้อมูล, ผู้ใช้ข้อมูล"
    severity_if_missing: "high"

  - id: "DGS41-09"
    category: "บทบาทและคำนิยาม"
    requirement: "ต้องกำหนดคำนิยามที่สำคัญที่ใช้ในนโยบาย เช่น ข้อมูล, ชุดข้อมูล, บัญชีข้อมูล, หมวดหมู่ของข้อมูล, การจัดชั้นความลับของข้อมูล"
    severity_if_missing: "medium"

  # ===== หมวด 4: นโยบายการบริหารจัดการข้อมูล - ข้อกำหนดทั่วไป =====
  - id: "DGS41-10"
    category: "ข้อกำหนดทั่วไป"
    requirement: "ต้องระบุข้อกำหนดและแนวทางการบริหารจัดการข้อมูลของหน่วยงาน ครอบคลุมหัวข้ออย่างน้อย 4 ส่วน ได้แก่ ข้อกำหนดทั่วไป, การจัดหมวดหมู่และชั้นความลับของข้อมูล, การบริหารจัดการข้อมูลตามวงจรชีวิตของข้อมูล และคุณภาพข้อมูล"
    severity_if_missing: "high"

  - id: "DGS41-11"
    category: "ข้อกำหนดทั่วไป"
    requirement: "ต้องจัดให้มีทรัพยากรด้านงบประมาณ บุคลากร และเทคโนโลยีที่เพียงพอ พร้อมสนับสนุนการฝึกอบรมธรรมาภิบาลข้อมูลและการบริหารจัดการข้อมูลให้ครอบคลุมทั้งวงจรชีวิตข้อมูล อย่างน้อยปีละ 1 ครั้ง"
    severity_if_missing: "medium"

  # ===== หมวด 5: การจัดหมวดหมู่และชั้นความลับของข้อมูล =====
  - id: "DGS41-12"
    category: "การจัดหมวดหมู่และชั้นความลับ"
    requirement: "ต้องกำหนดหมวดหมู่และประเภทชั้นความลับของข้อมูลที่ใช้กับข้อมูลทุกรูปแบบ (เอกสารกระดาษและข้อมูลดิจิทัล) โดยประเมินผลกระทบของข้อมูล และกำหนดระดับความปลอดภัยที่เหมาะสมสำหรับการสร้าง/จัดเก็บ/ใช้/เข้าถึงชุดข้อมูล"
    severity_if_missing: "high"

  - id: "DGS41-13"
    category: "การจัดหมวดหมู่และชั้นความลับ"
    requirement: "ต้องติดป้ายกำกับชุดข้อมูล (Labeling/Tagging Dataset) ตามผลประเมิน ระบุหมวดหมู่และประเภทชั้นความลับ และป้ายกำกับสำรองชั้นความลับ (ถ้ามี) เช่น ลับ ลับมาก ลับที่สุด"
    severity_if_missing: "high"

  - id: "DGS41-14"
    category: "การจัดหมวดหมู่และชั้นความลับ"
    requirement: "ต้องกำกับดูแลและติดตามอย่างต่อเนื่อง โดยตรวจสอบความปลอดภัยการใช้งานและรูปแบบการเข้าถึงของระบบและข้อมูล ทั้งผ่านกระบวนการอัตโนมัติหรือโดยบุคคล"
    severity_if_missing: "medium"

  # ===== หมวด 6: การบริหารจัดการข้อมูลตามวงจรชีวิตของข้อมูล =====
  - id: "DGS41-15"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องกำหนดนโยบาย แนวปฏิบัติ และสภาพแวดล้อมการบริหารจัดการข้อมูลตามวงจรชีวิตของข้อมูล (สร้าง จัดเก็บ ใช้ เผยแพร่ จัดเก็บถาวร ทำลาย) ที่เอื้อต่อความมั่นคงปลอดภัย คุ้มครองความเป็นส่วนตัว และคุณภาพข้อมูล"
    severity_if_missing: "high"

  - id: "DGS41-16"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องจัดเก็บข้อมูลให้สอดคล้องกับมาตรฐานการจัดชั้นความลับ ข้อมูลต้องถูกต้อง สมบูรณ์ เป็นปัจจุบัน พร้อมกำหนดสิทธิและจัดหาระบบ/เครื่องมือเข้าถึงข้อมูล และทำลายข้อมูลตามแนวปฏิบัติและกฎหมายที่เกี่ยวข้อง"
    severity_if_missing: "high"

  - id: "DGS41-17"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องจัดทำแนวปฏิบัติและมาตรฐานการประมวลผลและใช้ข้อมูล เพื่อให้ผู้ใช้นำข้อมูลไปใช้อย่างถูกต้องตามวัตถุประสงค์"
    severity_if_missing: "medium"

  - id: "DGS41-18"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องกำหนดนโยบายการเปิดเผยข้อมูล: ห้ามเปิดเผยข้อมูลที่ขัดต่อกฎหมาย/ระเบียบ, ต้องได้รับอนุญาตจากเจ้าของข้อมูลก่อนเปิดเผย และจัดให้มีช่องทางการเปิดเผยที่เข้าถึงและนำไปใช้ได้ง่าย"
    severity_if_missing: "high"

  - id: "DGS41-19"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องกำหนดกระบวนการ เทคโนโลยีและมาตรฐานทางเทคนิคที่ใช้ในการแลกเปลี่ยนข้อมูล และจัดทำสัญญาอนุญาตหรือข้อตกลงในการแลกเปลี่ยนข้อมูลและการนำข้อมูลไปใช้"
    severity_if_missing: "medium"

  - id: "DGS41-20"
    category: "วงจรชีวิตข้อมูล"
    requirement: "ต้องจัดทำแนวปฏิบัติด้านการรักษาความมั่นคงปลอดภัย ด้านคุณภาพข้อมูล ด้านคุ้มครองความเป็นส่วนตัว และแนวปฏิบัติให้กับผู้ประสานงาน/ศูนย์ติดต่อ (Contact Center)"
    severity_if_missing: "medium"

  # ===== หมวด 7: คุณภาพข้อมูล =====
  - id: "DGS41-21"
    category: "คุณภาพข้อมูล"
    requirement: "ต้องกำหนดนโยบายการจัดการคุณภาพข้อมูล เพื่อให้ข้อมูลเป็นไปตามเกณฑ์/คุณสมบัติที่กำหนด เช่น ความถูกต้องสมบูรณ์ ความสอดคล้องกัน ความเป็นปัจจุบัน ตรงตามความต้องการใช้งาน และความพร้อมใช้"
    severity_if_missing: "high"

  - id: "DGS41-22"
    category: "คุณภาพข้อมูล"
    requirement: "ต้องจัดทำเกณฑ์คุณภาพข้อมูลที่วัดผลได้ พร้อมแผนพัฒนาคุณภาพข้อมูลที่ระบุตัวชี้วัดและแผนปฏิบัติการ โดยออกแบบการเก็บข้อมูลให้รวมอยู่ในระบบและกระบวนการ (Quality by design)"
    severity_if_missing: "medium"

  - id: "DGS41-23"
    category: "คุณภาพข้อมูล"
    requirement: "ต้องประเมินผลและจัดการคุณภาพข้อมูลอย่างสม่ำเสมอตลอดวงจรชีวิตข้อมูล โดยเจ้าของข้อมูลและบริกรข้อมูลกำหนดกรอบคุณภาพข้อมูลเฉพาะหมวดหมู่ข้อมูล/โดเมน"
    severity_if_missing: "medium"

  - id: "DGS41-24"
    category: "คุณภาพข้อมูล"
    requirement: "ต้องพัฒนากระบวนการหรือกลไกให้ผู้ใช้สามารถให้ข้อเสนอแนะหรือ Feedback เพื่อรายงานปัญหาให้กับเจ้าของข้อมูล โดยเฉพาะข้อมูลหลัก (Master data) และข้อมูลอ้างอิง (Reference data)"
    severity_if_missing: "medium"

  # ===== หมวด 8: ข้อกฎหมายและเอกสารอ้างอิง =====
  - id: "DGS41-25"
    category: "ข้อกฎหมายและเอกสารอ้างอิง"
    requirement: "ต้องระบุข้อกฎหมายและเอกสารอ้างอิงที่เกี่ยวข้อง อย่างน้อย ได้แก่ ระเบียบว่าด้วยการรักษาความลับของทางราชการ พ.ศ. 2544, พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562, ประกาศ คพด. เรื่องธรรมาภิบาลข้อมูลภาครัฐ, ประกาศ คพด. เรื่องมาตรฐานการเปิดเผยข้อมูลเปิด และ มรด. 3-1"
    severity_if_missing: "high"

  - id: "DGS41-26"
    category: "ข้อกฎหมายและเอกสารอ้างอิง"
    requirement: "ต้องมีส่วนประวัติการแก้ไขเอกสาร บันทึกทุกครั้งที่มีการปรับปรุงนโยบาย (เวอร์ชัน ผู้จัดทำ ผู้อนุมัติ วันที่ รายละเอียดการแก้ไข) และส่วนข้อมูลเพิ่มเติม/เอกสารประกอบ"
    severity_if_missing: "medium"