name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยแนวทางการเปิดเผยข้อมูลเปิดภาครัฐในรูปแบบดิจิทัลต่อสาธารณะ"
short_code: "DGS-8"
reference: "มรด. 8 : 2567 (Open Government Data Guideline)"
note: "หมายเหตุ: ไฟล์ในโปรเจกต์ที่ระบุว่า '8' คือ มรด. 8 : 2567 (แนวทางการเปิดเผยข้อมูลเปิดภาครัฐ) ซึ่งแตกต่างจาก มสพร. 8-2565 (หลักเกณฑ์การจัดระดับชั้นและการแบ่งปันข้อมูลภาครัฐ) ที่ถูกอ้างถึงในมาตรฐานอื่น"
checklist:
  # ===== หมวด 1: การวัดระดับการเปิดเผยข้อมูลเปิดภาครัฐ =====
  - id: "DGS8-01"
    category: "การวัดระดับการเปิดเผย"
    requirement: "ต้องประเมินระดับการเปิดเผยข้อมูลเปิดภาครัฐตามระดับ 1-5 (Initial, Repeatable, Defined, Managed, Optimized) ครอบคลุม 5 กิจกรรมหลัก ได้แก่ การบริหารจัดการข้อมูลเปิด, การสร้างองค์ความรู้และทักษะ, การสนับสนุน/ส่งเสริมการนำข้อมูลไปใช้, งบประมาณ และการกำหนดกลยุทธ์"
    severity_if_missing: "high"

  - id: "DGS8-02"
    category: "การวัดระดับการเปิดเผย"
    requirement: "ต้องกำหนดระดับการเปิดเผยชุดข้อมูลเปิด (Openness Rating) ตามระดับ 1 ดาว ถึง 5 ดาว (OL, RE, OF, URI, LD) โดยควรเปิดเผยข้อมูลในรูปแบบ Machine-Readable และระดับอย่างน้อย 3 ดาวขึ้นไป (เช่น CSV, API)"
    severity_if_missing: "high"

  # ===== หมวด 2: กระบวนการเปิดเผยข้อมูลเปิดภาครัฐ - การวางแผน =====
  - id: "DGS8-03"
    category: "การวางแผนการเปิดเผย"
    requirement: "ต้องจัดทำกระบวนการเปิดเผยข้อมูลเปิด แบ่งเป็น 4 กระบวนการหลัก ได้แก่ การวางแผน, การดำเนินการเปิดเผย, การวัดผล และการปรับปรุงอย่างต่อเนื่อง"
    severity_if_missing: "high"

  - id: "DGS8-04"
    category: "การวางแผนการเปิดเผย"
    requirement: "ต้องสำรวจชุดข้อมูลที่มีในปัจจุบันของหน่วยงาน โดยเริ่มจากข้อมูลตามพันธกิจและภารกิจ รวมถึงความต้องการของผู้มีส่วนได้เสีย เพื่อทราบว่าหน่วยงานมีข้อมูลใดบ้างหรือข้อมูลใดที่ยังไม่มีแต่ต้องการ"
    severity_if_missing: "high"

  - id: "DGS8-05"
    category: "การวางแผนการเปิดเผย"
    requirement: "ต้องจัดทำแนวนโยบายและแนวปฏิบัติการบริหารจัดการข้อมูล อ้างอิงตาม มรด. 4-1, มรด. 4-2 และกรอบธรรมาภิบาลข้อมูลภาครัฐ (มรด. 6)"
    severity_if_missing: "medium"

  - id: "DGS8-06"
    category: "การวางแผนการเปิดเผย"
    requirement: "ต้องระบุชุดข้อมูลและจำแนกประเภทบัญชีข้อมูล พร้อมจัดระดับความสำคัญตามเกณฑ์การจัดระดับความสำคัญ และนำชุดข้อมูลเข้าสู่กระบวนการอนุมัติการเปิดเผยข้อมูล"
    severity_if_missing: "high"

  # ===== หมวด 3: การดำเนินการเปิดเผยข้อมูลเปิดภาครัฐ =====
  - id: "DGS8-07"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องรวบรวมชุดข้อมูลจากแหล่งต่าง ๆ เพื่อตรวจสอบว่าชุดข้อมูลอยู่ที่แหล่งใด ทั้งข้อมูลที่เปิดเผยอยู่แล้ว ข้อมูลจากภารกิจ/การดำเนินงาน และความต้องการของผู้ใช้ข้อมูล"
    severity_if_missing: "high"

  - id: "DGS8-08"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องตรวจสอบคุณภาพของชุดข้อมูลเปิดภาครัฐตามมาตรฐานที่กำหนด โดยพิจารณาคุณภาพข้อมูลให้ครบถ้วน สมบูรณ์ พร้อมใช้งาน และตรงตามความต้องการ"
    severity_if_missing: "high"

  - id: "DGS8-09"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องจำแนกหมวดหมู่ กำหนดและจัดระดับชั้นของชุดข้อมูล โดยพิจารณาลิขสิทธิ์ของข้อมูล การคุ้มครองข้อมูลส่วนบุคคล ความถูกต้อง ครบถ้วน และความสามารถในการเข้าถึง/ใช้ชุดข้อมูลอย่างต่อเนื่อง"
    severity_if_missing: "high"

  - id: "DGS8-10"
    category: "การดำเนินการเปิดเผย"
    requirement: "ข้อมูลที่จัดอยู่ในหมวดหมู่ 'ข้อมูลสาธารณะ' และระดับชั้น 'เปิดเผย' ถือเป็นข้อมูลที่หน่วยงานควรนำมาพิจารณาเปิดเผยเป็นลำดับแรก"
    severity_if_missing: "medium"

  - id: "DGS8-11"
    category: "การดำเนินการเปิดเผย"
    requirement: "กรณีข้อมูลส่วนบุคคล ต้องตรวจสอบให้แน่ใจว่าได้ดำเนินการตามกฎหมายว่าด้วยการคุ้มครองข้อมูลส่วนบุคคล โดยข้อมูลส่วนบุคคลต้องไม่เปิดเผยหากไม่ได้รับความยินยอม และอาจกำหนดมาตรการปกปิด/ลบล้างความเป็นส่วนบุคคล (ระวังการระบุตัวบุคคลทางอ้อมเมื่อเชื่อมโยงกับแหล่งข้อมูลอื่น)"
    severity_if_missing: "high"

  - id: "DGS8-12"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องจัดทำชุดข้อมูลให้อยู่ในรูปแบบของข้อมูลเปิด (Open Format) ที่ไม่ขึ้นกับแพลตฟอร์ม ไม่จำกัดสิทธิ์ (Non-proprietary) และอ่านได้ด้วยเครื่อง (Machine-Readable) พร้อมเมทาดาตา"
    severity_if_missing: "high"

  - id: "DGS8-13"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องนำชุดข้อมูลเข้าสู่กระบวนการอนุมัติการเปิดเผยข้อมูล และเผยแพร่ผ่านเว็บไซต์ของหน่วยงาน รวมถึงเชื่อมโยงและจัดส่งที่ศูนย์กลางข้อมูลเปิดภาครัฐ (data.go.th)"
    severity_if_missing: "high"

  - id: "DGS8-14"
    category: "การดำเนินการเปิดเผย"
    requirement: "ต้องกำหนดข้อกำหนดหรือเงื่อนไขการให้บริการ (Terms of Service) และสัญญาอนุญาตให้ใช้ข้อมูล ควบคู่กับชุดข้อมูลที่เปิดเผย"
    severity_if_missing: "medium"

  # ===== หมวด 4: การสร้างการมีส่วนร่วมและความตระหนัก =====
  - id: "DGS8-15"
    category: "การมีส่วนร่วมและความตระหนัก"
    requirement: "ต้องจัดให้มีช่องทางรับฟังความคิดเห็นและคำร้องขอข้อมูลจากผู้ใช้ข้อมูล ผ่านศูนย์กลางข้อมูลเปิดภาครัฐและช่องทางของหน่วยงาน เพื่อใช้ปรับปรุงคุณภาพข้อมูล"
    severity_if_missing: "high"

  - id: "DGS8-16"
    category: "การมีส่วนร่วมและความตระหนัก"
    requirement: "ต้องสร้างความตระหนักรู้ในการเปิดเผยข้อมูล โดยเจ้าของข้อมูลคำนึงถึงความรับผิดชอบของหน่วยงานและความสำคัญของชุดข้อมูลที่เปิดเผยต่อสาธารณะ เพื่อสร้างความเชื่อมั่นของผู้ใช้ข้อมูลต่อข้อมูลเปิดภาครัฐ"
    severity_if_missing: "medium"

  - id: "DGS8-17"
    category: "การมีส่วนร่วมและความตระหนัก"
    requirement: "ต้องกำหนดหน้าที่ความรับผิดชอบของผู้เกี่ยวข้องกับการจัดหมวดหมู่และระดับชั้นตามธรรมาภิบาลข้อมูลภาครัฐภายในหน่วยงาน เพื่อให้ชุดข้อมูลเปิดภาครัฐมีความถูกต้อง ชัดเจน ปลอดภัย และพร้อมนำไปใช้ประโยชน์"
    severity_if_missing: "high"

  # ===== หมวด 5: การวัดผลและการปรับปรุงอย่างต่อเนื่อง =====
  - id: "DGS8-18"
    category: "การวัดผลและปรับปรุง"
    requirement: "ต้องวัดผลการเปิดเผยข้อมูลเปิดภาครัฐ โดยจัดทำรายงานผลการเปิดเผยชุดข้อมูล เช่น ความพร้อมของการนำชุดข้อมูลมาเผยแพร่ คุณภาพของชุดข้อมูลเปิด และผลการรับฟังความคิดเห็นจากช่องทางของศูนย์กลางข้อมูลเปิดภาครัฐ"
    severity_if_missing: "high"

  - id: "DGS8-19"
    category: "การวัดผลและปรับปรุง"
    requirement: "ต้องปรับปรุงอย่างต่อเนื่อง โดยทบทวน/ปรับปรุงนโยบาย กฎเกณฑ์ แนวทาง วิธีปฏิบัติที่เกี่ยวข้องกับการเปิดเผยข้อมูลเปิดภาครัฐ และพัฒนาการบริหารจัดการศูนย์กลางข้อมูลเปิดภาครัฐ (การเฝ้าระวัง การบริหารจัดการความมั่นคงปลอดภัยและความต่อเนื่อง)"
    severity_if_missing: "high"

  - id: "DGS8-20"
    category: "การวัดผลและปรับปรุง"
    requirement: "ต้องจัดทำแผนการดำเนินงานและตัวอย่างรายการตรวจสอบกระบวนการเปิดเผยข้อมูลเปิดภาครัฐ ระบุขั้นตอน กิจกรรม สถานะการดำเนินการ สิ่งที่ได้ดำเนินการ วันที่ และผู้ดำเนินการ"
    severity_if_missing: "medium"

  # ===== หมวด 6: เมทาดาตาและความสอดคล้องกับมาตรฐานที่เกี่ยวข้อง =====
  - id: "DGS8-21"
    category: "เมทาดาตาและมาตรฐานอ้างอิง"
    requirement: "ต้องจัดทำคำอธิบายชุดข้อมูลส่วนหลัก 14 รายการ (เมทาดาตาเชิงธุรกิจ) ควบคู่กับชุดข้อมูลที่เปิดเผย ตามมาตรฐานแนวทางการจัดทำบัญชีข้อมูลภาครัฐ (มรด. 3-1)"
    severity_if_missing: "high"

  - id: "DGS8-22"
    category: "เมทาดาตาและมาตรฐานอ้างอิง"
    requirement: "การจัดหมวดหมู่และระดับชั้นข้อมูลต้องสอดคล้องกับ มสพร. 8-2565 (หลักเกณฑ์การจัดระดับชั้นและการแบ่งปันข้อมูลภาครัฐ) และกรอบธรรมาภิบาลข้อมูลภาครัฐ (มรด. 6)"
    severity_if_missing: "medium"

  - id: "DGS8-23"
    category: "เมทาดาตาและมาตรฐานอ้างอิง"
    requirement: "การเปิดเผยข้อมูลต้องสอดคล้องกับกฎหมายและแนวปฏิบัติที่เกี่ยวข้อง ได้แก่ พ.ร.บ. ข้อมูลข่าวสารของราชการ พ.ศ. 2540, พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562, ประกาศ คพด. เรื่องมาตรฐานและหลักเกณฑ์การเปิดเผยข้อมูลเปิดภาครัฐ และเชื่อมโยงกับ มรด. 3-1/3-2 (GD Catalog)"
    severity_if_missing: "high"