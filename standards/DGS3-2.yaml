name: "มาตรฐานรัฐบาลดิจิทัล ว่าด้วยแนวทางการลงทะเบียนบัญชีข้อมูลภาครัฐ"
short_code: "DGS-3-2"
reference: "มรด. 3-2 : 2565 (Government Data Catalog Registration Guideline)"
checklist:
  # ===== หมวด 1: องค์ประกอบและการจัดการบัญชีข้อมูลภาครัฐ =====
  - id: "DGS32-01"
    category: "องค์ประกอบบัญชีข้อมูล"
    requirement: "ต้องระบุองค์ประกอบของบัญชีข้อมูลภาครัฐให้ครบ ได้แก่ ผู้กำกับดูแลข้อมูล (คณะกรรมการธรรมาภิบาลข้อมูล), เจ้าของชุดข้อมูล, กระบวนงาน, ชุดข้อมูล และคำอธิบายชุดข้อมูล (เมทาดาตา)"
    severity_if_missing: "high"

  - id: "DGS32-02"
    category: "องค์ประกอบบัญชีข้อมูล"
    requirement: "ต้องกำหนดให้มีระบบบัญชีข้อมูลของหน่วยงาน (Agency Data Catalog) ที่สามารถเชื่อมต่อกับระบบบัญชีข้อมูลภาครัฐ (GD Catalog) ผ่าน Token API ได้ หรือใช้ระบบที่รองรับ เช่น CKAN Open-D / Thai GDC"
    severity_if_missing: "high"

  - id: "DGS32-03"
    category: "องค์ประกอบบัญชีข้อมูล"
    requirement: "ต้องระบุกระบวนการจัดการบัญชีข้อมูลภาครัฐให้ครบวงจร ครอบคลุม การลงทะเบียน, การปรับปรุง, การเพิกถอน, การติดตามบัญชีข้อมูล และการใช้ประโยชน์บัญชีข้อมูลร่วมกัน"
    severity_if_missing: "high"

  # ===== หมวด 2: บทบาทและผู้มีส่วนเกี่ยวข้อง =====
  - id: "DGS32-04"
    category: "ผู้มีส่วนเกี่ยวข้อง"
    requirement: "ต้องแต่งตั้งและระบุบทบาทฝั่งหน่วยงานให้ครบ ได้แก่ นายทะเบียนบัญชีข้อมูลหน่วยงาน (หัวหน้าหน่วยงานหรือผู้ได้รับมอบหมาย), ผู้จัดการระบบบัญชีข้อมูลหน่วยงาน (IT/Admin) และเจ้าหน้าที่ลงทะเบียนบัญชีข้อมูล (ผู้ปฏิบัติงานด้านข้อมูล สามารถมีได้มากกว่า 1 คน)"
    severity_if_missing: "high"

  - id: "DGS32-05"
    category: "ผู้มีส่วนเกี่ยวข้อง"
    requirement: "ต้องระบุหน้าที่ของนายทะเบียนบัญชีข้อมูลหน่วยงานในการกำกับดูแล อนุมัติ/เห็นชอบบัญชีข้อมูลก่อนลงทะเบียน ตรวจสอบให้เป็นไปตามข้อกฎหมาย และอนุญาตการใช้/เปิดเผยทะเบียนบัญชีข้อมูล"
    severity_if_missing: "high"

  - id: "DGS32-06"
    category: "ผู้มีส่วนเกี่ยวข้อง"
    requirement: "ต้องระบุหน้าที่ของผู้จัดการระบบบัญชีข้อมูลหน่วยงานในการลงทะเบียนระบบบัญชีข้อมูลหน่วยงานเข้าสู่ระบบลงทะเบียนฯ และกำหนด/จัดการสิทธิเจ้าหน้าที่ลงทะเบียนบัญชีข้อมูล"
    severity_if_missing: "medium"

  - id: "DGS32-07"
    category: "ผู้มีส่วนเกี่ยวข้อง"
    requirement: "ต้องรับทราบและประสานงานกับบทบาทฝั่งสำนักงานสถิติแห่งชาติ (ผู้ดูแล GD Catalog) ได้แก่ นายทะเบียนระบบบัญชีข้อมูลภาครัฐ, ผู้จัดการระบบลงทะเบียน, เจ้าหน้าที่ตรวจสอบบัญชีข้อมูล, เจ้าหน้าที่ประสานหน่วยงาน และเจ้าหน้าที่จัดหมวดหมู่"
    severity_if_missing: "low"

  # ===== หมวด 3: หลักเกณฑ์การพิจารณาบัญชีข้อมูลก่อนลงทะเบียน =====
  - id: "DGS32-08"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "บัญชีข้อมูลที่จะลงทะเบียนต้องได้รับอนุมัติหรือเห็นชอบจากนายทะเบียนบัญชีข้อมูลหน่วยงาน หรือคณะกรรมการธรรมาภิบาลข้อมูล หรือคณะที่หน่วยงานแต่งตั้งให้มีอำนาจสูงสุดในธรรมาภิบาลข้อมูล"
    severity_if_missing: "high"

  - id: "DGS32-09"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "นายทะเบียนบัญชีข้อมูลหน่วยงานต้องตรวจสอบและพิจารณาอนุมัติการลงทะเบียนให้เป็นไปตามข้อกฎหมายที่เกี่ยวข้อง"
    severity_if_missing: "high"

  - id: "DGS32-10"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "ต้องเป็นบัญชีข้อมูลที่หน่วยงานเป็นเจ้าของเท่านั้น และไม่ซ้ำซ้อนกับชุดข้อมูลที่ลงทะเบียนไว้แล้ว"
    severity_if_missing: "high"

  - id: "DGS32-11"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "ต้องเป็นบัญชีข้อมูลที่เข้าถึงได้ตามเงื่อนไขที่หน่วยงานกำหนด และอ้างอิงได้ถึงแหล่งทรัพยากรชุดข้อมูล/แหล่งจัดเก็บข้อมูลหลักที่เป็นทางการของหน่วยงาน"
    severity_if_missing: "high"

  - id: "DGS32-12"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "คำอธิบายชุดข้อมูลต้องถูกต้องและครบถ้วนตามมาตรฐานขั้นต่ำที่กำหนดในแนวทางการจัดทำบัญชีข้อมูลภาครัฐ (มรด. 3-1) และสอดคล้องกับเกณฑ์คุณภาพคำอธิบายชุดข้อมูล"
    severity_if_missing: "high"

  - id: "DGS32-13"
    category: "เกณฑ์พิจารณาการลงทะเบียน"
    requirement: "ต้องวิเคราะห์การเผยแพร่บัญชีข้อมูลตามหมวดหมู่ธรรมาภิบาลข้อมูล (ข้อมูลสาธารณะ, ส่วนบุคคล, ความลับทางราชการ, ความมั่นคง) เพื่อกำหนดสิทธิการเผยแพร่ (Public / Private / Share for GD Catalog) ให้ถูกต้อง"
    severity_if_missing: "high"

  # ===== หมวด 4: ขั้นตอนการลงทะเบียนบัญชีข้อมูลภาครัฐ =====
  - id: "DGS32-14"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "ต้องทำหนังสือขอเข้าใช้งานระบบลงทะเบียนบัญชีข้อมูลภาครัฐ พร้อมแบบลงทะเบียนที่ลงนามโดยผู้บริหารหน่วยงาน แจ้งมายังสำนักงานสถิติแห่งชาติ เพื่อมอบหมายผู้รับผิดชอบ"
    severity_if_missing: "high"

  - id: "DGS32-15"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "ผู้เข้าใช้งานระบบต้องมีบัญชีผู้ใช้ระบบยืนยันตัวบุคคลกลาง (OpenID Service) ของ สพร. และ Log in เข้าสู่ระบบภายใน 5 วันทำการหลังได้รับอีเมลแจ้งสิทธิ"
    severity_if_missing: "medium"

  - id: "DGS32-16"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "ผู้จัดการระบบบัญชีข้อมูลหน่วยงานต้องลงทะเบียนระบบบัญชีข้อมูลหน่วยงานด้วย Token API เพื่อให้การรวบรวมบัญชีข้อมูลเข้าสู่ระบบบัญชีข้อมูลภาครัฐเป็นไปโดยอัตโนมัติ"
    severity_if_missing: "high"

  - id: "DGS32-17"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "เจ้าหน้าที่ลงทะเบียนบัญชีข้อมูลต้องลงทะเบียนเฉพาะบัญชีข้อมูลที่ผ่านการอนุมัติจากนายทะเบียนบัญชีข้อมูลหน่วยงาน โดยดึงบัญชีข้อมูลจากระบบบัญชีข้อมูลหน่วยงานเข้าสู่ระบบลงทะเบียนฯ"
    severity_if_missing: "high"

  - id: "DGS32-18"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "ต้องเข้าสู่กระบวนการตรวจสอบโดยเจ้าหน้าที่ตรวจสอบบัญชีข้อมูล และกรณีไม่ผ่านเกณฑ์ต้องปรับปรุงที่ระบบบัญชีข้อมูลหน่วยงานแล้วลงทะเบียนใหม่ จนผ่านเกณฑ์เพื่อเสนอนายทะเบียนระบบบัญชีข้อมูลภาครัฐอนุมัติ"
    severity_if_missing: "high"

  - id: "DGS32-19"
    category: "ขั้นตอนการลงทะเบียน"
    requirement: "ต้องรองรับการนำเข้า/เชื่อมโยงข้อมูลทั้งแบบอัตโนมัติ (สำหรับระบบที่ใช้ CKAN Open-D) และทราบเงื่อนไขการลงทะเบียนกรณีหน่วยงานไม่มีระบบบัญชีข้อมูลของตนเอง"
    severity_if_missing: "medium"

  # ===== หมวด 5: เกณฑ์คุณภาพคำอธิบายชุดข้อมูล =====
  - id: "DGS32-20"
    category: "คุณภาพคำอธิบายชุดข้อมูล"
    requirement: "คำอธิบายชุดข้อมูลต้องมีความถูกต้องและเชื่อถือได้ (Accuracy and Reliability) สอดคล้องกับทรัพยากรชุดข้อมูลจริง"
    severity_if_missing: "high"

  - id: "DGS32-21"
    category: "คุณภาพคำอธิบายชุดข้อมูล"
    requirement: "คำอธิบายชุดข้อมูลต้องมีความครบถ้วน (Completeness) ครบทั้งคำอธิบายส่วนหลัก (Mandatory Metadata) 14 รายการ รวมถึงคำอธิบายส่วนทางเลือก (Optional Metadata) ตามความเหมาะสม"
    severity_if_missing: "high"

  - id: "DGS32-22"
    category: "คุณภาพคำอธิบายชุดข้อมูล"
    requirement: "คำอธิบายชุดข้อมูลต้องมีความต้องกัน (Consistency) กับทรัพยากรชุดข้อมูลที่อยู่ภายใต้ชุดข้อมูลนั้น"
    severity_if_missing: "high"

  - id: "DGS32-23"
    category: "คุณภาพคำอธิบายชุดข้อมูล"
    requirement: "คำอธิบายชุดข้อมูลต้องมีความเป็นปัจจุบัน (Timeliness) มีการปรับปรุงให้สอดคล้องกับการเปลี่ยนแปลงของชุดข้อมูล เช่น วันที่ปรับปรุงล่าสุด"
    severity_if_missing: "medium"

  - id: "DGS32-24"
    category: "คุณภาพคำอธิบายชุดข้อมูล"
    requirement: "การบริหารจัดการคุณภาพบัญชีข้อมูลต้องประยุกต์จากเกณฑ์การประกันคุณภาพข้อมูล (Data Quality Assurance) ตามนโยบายการบริหารจัดการข้อมูลและกรอบธรรมาภิบาลข้อมูล"
    severity_if_missing: "medium"

  # ===== หมวด 6: เกณฑ์การตรวจสอบบัญชีข้อมูลของหน่วยงาน =====
  - id: "DGS32-25"
    category: "เกณฑ์การตรวจสอบ"
    requirement: "ต้องตรวจสอบให้ชื่อชุดข้อมูลมีความถูกต้องทั้งตัวอักษรและสื่อความหมายให้ผู้ใช้เข้าใจ"
    severity_if_missing: "medium"

  - id: "DGS32-26"
    category: "เกณฑ์การตรวจสอบ"
    requirement: "ต้องตรวจสอบความเป็นเจ้าของข้อมูล (Data Owner) ของชุดข้อมูลที่ลงทะเบียน"
    severity_if_missing: "high"

  - id: "DGS32-27"
    category: "เกณฑ์การตรวจสอบ"
    requirement: "ต้องตรวจสอบความครบถ้วนของคำอธิบายชุดข้อมูลหลัก (Mandatory Metadata) 14 รายการ ตามมาตรฐาน มรด. 3-1"
    severity_if_missing: "high"

  - id: "DGS32-28"
    category: "เกณฑ์การตรวจสอบ"
    requirement: "ต้องตรวจสอบความแนบนัย (Consistency) ของคำอธิบายชุดข้อมูลกับทรัพยากรชุดข้อมูล และการเข้าถึงแหล่งข้อมูลกรณีเป็นข้อมูลเปิด"
    severity_if_missing: "medium"

  - id: "DGS32-29"
    category: "เกณฑ์การตรวจสอบ"
    requirement: "ต้องตรวจสอบการกำหนดป้ายกำกับ/คำสำคัญของบัญชีข้อมูลให้สอดคล้องและสื่อความหมายกับชุดข้อมูล"
    severity_if_missing: "low"

  # ===== หมวด 7: การปรับปรุงและเพิกถอนบัญชีข้อมูล =====
  - id: "DGS32-30"
    category: "การปรับปรุง/เพิกถอน"
    requirement: "ต้องกำหนดแนวทางการปรับปรุงบัญชีข้อมูลที่ลงทะเบียนแล้ว ครอบคลุมกรณี: เปลี่ยนประเภทชุดข้อมูล, แก้ไขชื่อชุดข้อมูล, เปลี่ยนแปลง Mandatory Metadata 14 รายการ, การลบชุดข้อมูล และการแก้ไขการอ้างอิงทรัพยากรชุดข้อมูล"
    severity_if_missing: "high"

  - id: "DGS32-31"
    category: "การปรับปรุง/เพิกถอน"
    requirement: "ต้องแจ้งการปรับปรุงหรือเพิกถอนบัญชีข้อมูลในระบบลงทะเบียนบัญชีข้อมูลภาครัฐ และเข้าสู่ขั้นตอนการตรวจสอบเพื่อเสนออนุมัติต่อนายทะเบียนระบบบัญชีข้อมูลภาครัฐ"
    severity_if_missing: "high"

  - id: "DGS32-32"
    category: "การปรับปรุง/เพิกถอน"
    requirement: "ต้องกำหนดเงื่อนไขการเพิกถอนการลงทะเบียนให้ครบ ได้แก่ การลบบัญชีข้อมูลจากระบบหน่วยงาน, การแจ้งขอเพิกถอน, การเปลี่ยนแปลงหน่วยงานเจ้าของข้อมูล และกรณีไม่เป็นไปตามหลักเกณฑ์การลงทะเบียน"
    severity_if_missing: "medium"

  # ===== หมวด 8: การเฝ้าติดตามและการเก็บรักษาทะเบียน =====
  - id: "DGS32-33"
    category: "การติดตามและเก็บรักษา"
    requirement: "ต้องมีกระบวนการเฝ้าติดตามวงจรชีวิตของชุดข้อมูล (Monitoring) เพื่อติดตามการปรับปรุง แก้ไข และเพิกถอนชุดข้อมูล ให้บัญชีข้อมูลภาครัฐสมบูรณ์พร้อมใช้อยู่เสมอ"
    severity_if_missing: "high"

  - id: "DGS32-34"
    category: "การติดตามและเก็บรักษา"
    requirement: "ต้องรองรับการแจ้งเตือนการเปลี่ยนแปลงชุดข้อมูลผ่านอีเมลไปยังผู้เกี่ยวข้องในระบบลงทะเบียนบัญชีข้อมูล โดยอัตโนมัติ"
    severity_if_missing: "medium"

  - id: "DGS32-35"
    category: "การติดตามและเก็บรักษา"
    requirement: "ต้องมีการเก็บรักษาทะเบียนบัญชีข้อมูลภาครัฐ โดยจัดเก็บการบันทึกเหตุการณ์ (Logging) และบันทึกการดำเนินงาน (Activity Log) เพื่อให้ติดตามและตรวจสอบสถานะบัญชีข้อมูลในระบบได้"
    severity_if_missing: "medium"

  # ===== หมวด 9: การติดตามสิทธิผู้ใช้งานและการเชื่อมต่อ API =====
  - id: "DGS32-36"
    category: "สิทธิผู้ใช้งานและ API"
    requirement: "เมื่อผู้เข้าใช้งานระบบมีการเปลี่ยนแปลง (เปลี่ยนหน้าที่, โยกย้าย, ลาออก) ต้องแจ้งสำนักงานสถิติแห่งชาติเพื่อปรับปรุง/ยกเลิกสิทธิ และต้องทบทวน/ตรวจสอบการมีอยู่จริงของผู้ใช้งานระบบประจำปี"
    severity_if_missing: "medium"

  - id: "DGS32-37"
    category: "สิทธิผู้ใช้งานและ API"
    requirement: "ต้องรองรับรูปแบบบริการทางโปรแกรมเชื่อมต่อ (API) ตามข้อกำหนดของสำนักงานสถิติแห่งชาติ ได้แก่ CKAN-API (V3) ด้วย Token Key และ Directory API (บริการ Dataset, Resource ฯลฯ)"
    severity_if_missing: "medium"

  - id: "DGS32-38"
    category: "สิทธิผู้ใช้งานและ API"
    requirement: "ต้องเปิดเผยทะเบียนบัญชีข้อมูลภาครัฐที่เผยแพร่แบบสาธารณะให้เป็นไปตามคุณลักษณะของข้อมูลเปิดภาครัฐ และเชื่อมต่อไปยังศูนย์กลางข้อมูลเปิดภาครัฐ (data.go.th) และระบบนามานุกรม (Directory Service)"
    severity_if_missing: "medium"

  # ===== หมวด 10: ความสอดคล้องกับกฎหมายและมาตรฐานที่เกี่ยวข้อง =====
  - id: "DGS32-39"
    category: "กฎหมายและมาตรฐานอ้างอิง"
    requirement: "การลงทะเบียนและเปิดเผยบัญชีข้อมูลต้องสอดคล้องกับกฎหมายหลัก ได้แก่ พ.ร.บ. การบริหารงานและการให้บริการภาครัฐผ่านระบบดิจิทัล พ.ศ. 2562, พ.ร.บ. ข้อมูลข่าวสารของราชการ พ.ศ. 2540, พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562, ระเบียบว่าด้วยการรักษาความลับของทางราชการ พ.ศ. 2544 และ พ.ร.บ. การรักษาความมั่นคงปลอดภัยไซเบอร์ พ.ศ. 2562"
    severity_if_missing: "high"

  - id: "DGS32-40"
    category: "กฎหมายและมาตรฐานอ้างอิง"
    requirement: "การดำเนินการต้องสอดคล้องกับมาตรฐานที่เกี่ยวข้อง ได้แก่ มรด. 3-1 (การจัดทำบัญชีข้อมูล), มรด. 4-1/4-2 (นโยบายและแนวปฏิบัติการบริหารจัดการข้อมูล), มรด. 5 (การประเมินคุณภาพข้อมูล) และ มสพร. 8 (การจัดระดับชั้นและการแบ่งปันข้อมูล)"
    severity_if_missing: "medium"